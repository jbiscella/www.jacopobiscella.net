title: "Jacopo Biscella"
description: "Personal notes on software engineering, system architecture, and testing."
url: "https://www.jacopobiscella.net"
baseurl: ""
repository: "jbiscella/www.jacopobiscella.net"

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

aux_links:
  "LinkedIn":
    - "https://www.linkedin.com/in/jacopobiscella/"
  "GitHub":
    - "https://github.com/jbiscella"

aux_links_new_tab: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "&copy; Jacopo Biscella &middot; Nyon, Switzerland"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - "*.puml"
  - README.md
